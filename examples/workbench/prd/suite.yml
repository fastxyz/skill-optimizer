name: prd-eval
references: ./references
models:
  - openrouter/anthropic/claude-sonnet-4-6
  - openrouter/openai/gpt-5-mini
  - openrouter/google/gemini-2.5-pro
env:
  - OPENROUTER_API_KEY
timeoutSeconds: 600
appendSystemPrompt: |
  A Product Requirements Document skill is available at /work/prd/SKILL.md.
  Read and follow it when writing PRDs. Save PRD output to the top level of /work as prd.md.
cases:
  - name: write-prd-ai-search
    task: |
      A product discovery session has been completed. The brief is in brief-ai-search.md.
      Write a complete Product Requirements Document following the mandatory structure
      defined in /work/prd/SKILL.md. Save the PRD as prd.md.
    graders:
      - name: ai-search-prd-structure
        command: node $CASE/checks/grade-ai-search-prd.mjs

  - name: write-prd-api-gateway
    task: |
      A product discovery session has been completed. The brief is in brief-api-gateway.md.
      Write a complete Product Requirements Document following the mandatory structure
      defined in /work/prd/SKILL.md. Save the PRD as prd.md.
    graders:
      - name: api-gateway-prd-structure
        command: node $CASE/checks/grade-api-gateway-prd.mjs
