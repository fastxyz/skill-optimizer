name: native-data-fetching-eval
references: ./references
workspace: ./workspace
models:
  - openrouter/anthropic/claude-sonnet-4.6
  - openrouter/openai/gpt-5-mini
  - openrouter/google/gemini-2.5-pro
env:
  - OPENROUTER_API_KEY
timeoutSeconds: 600
appendSystemPrompt: |
  Keep task outputs at the top level of /work unless the user asks otherwise.
cases:
  - name: review-client
    task: |
      A teammate submitted a pull request adding `api/client.ts`. Review this file for
      networking and data-fetching issues using the Expo skill at
      `references/native-data-fetching/SKILL.md`.

      Write all findings to `findings.txt`. Each line must identify the file, line number,
      and issue, for example:
        api/client.ts:12 — description of the problem and which rule it breaks

      Be thorough — check every function in the file.
    graders:
      - name: client-findings
        command: node $CASE/checks/grade-client-findings.mjs

  - name: review-dashboard
    task: |
      A teammate submitted a pull request adding `screens/DashboardScreen.tsx`. Review this
      file for networking and data-fetching issues using the Expo skill at
      `references/native-data-fetching/SKILL.md`.

      Write all findings to `findings.txt`. Each line must identify the file, line number,
      and issue, for example:
        screens/DashboardScreen.tsx:5 — description of the problem and which rule it breaks

      Be thorough — check imports, environment variables, useEffect hooks, and every fetch call.
    graders:
      - name: dashboard-findings
        command: node $CASE/checks/grade-dashboard-findings.mjs
