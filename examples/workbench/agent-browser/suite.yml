name: agent-browser-skill-eval
references: ./references
models:
  - openrouter/anthropic/claude-sonnet-4.6
  - openrouter/openai/gpt-5-mini
  - openrouter/google/gemini-2.5-pro
env:
  - OPENROUTER_API_KEY
timeoutSeconds: 600
appendSystemPrompt: |
  The `agent-browser` CLI is available on your PATH at `/work/bin/agent-browser`.
  Use it for all browser automation tasks.

cases:
  - name: capture-homepage
    task: |
      Use the agent-browser CLI to complete the following task:

      1. Open https://example.com in the browser.
      2. Take a screenshot and save it as home.png in /work.
      3. Get the page title and write it to /work/title.txt.
      4. Close the browser when done.

      Before running any agent-browser commands, load the core skill reference to
      understand the correct workflow patterns.
    graders:
      - name: check-outputs
        command: node $CASE/checks/grade-capture-homepage-findings.mjs

  - name: search-screenshot
    task: |
      Use the agent-browser CLI to complete the following task:

      1. Open https://duckduckgo.com.
      2. Search for "rust browser automation" using the search box.
      3. Wait for the results to load (use a smart wait — not a bare time delay).
      4. Take a screenshot of the results page and save it as search-results.png in /work.
      5. Close the browser when done.

      Before running any agent-browser commands, load the core skill reference to
      understand the correct workflow patterns.
    graders:
      - name: check-outputs
        command: node $CASE/checks/grade-search-screenshot-findings.mjs

  - name: extract-stories
    task: |
      Use the agent-browser CLI to complete the following task:

      1. Open https://news.ycombinator.com.
      2. Use the accessibility tree snapshot to identify the top 3 story titles on the page.
      3. Write those 3 story titles to /work/stories.txt, one per line.
      4. Close the browser when done.

      Before running any agent-browser commands, load the core skill reference to
      understand the correct workflow patterns.
    graders:
      - name: check-outputs
        command: node $CASE/checks/grade-extract-stories-findings.mjs
