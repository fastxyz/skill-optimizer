<svg width="1100" height="320" viewBox="0 0 1100 320" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#6B7280"/>
    </marker>
    <marker id="arr-loop" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#9CA3AF"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="320" fill="#FAFAFA" rx="6"/>

  <!-- Title -->
  <text x="550" y="24" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">skill-optimizer: Optimizer Loop</text>

  <!-- ── STEP 1: Your Repo ── -->
  <rect x="20" y="50" width="140" height="74" rx="8" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1.5"/>
  <text x="90" y="78" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Your Repo</text>
  <text x="90" y="96" text-anchor="middle" font-size="10" fill="#6B7280">skill-optimizer.json</text>
  <text x="90" y="112" text-anchor="middle" font-size="10" fill="#6B7280">SKILL.md</text>

  <!-- Arrow → -->
  <line x1="160" y1="87" x2="176" y2="87" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── STEP 2: Initialize ── -->
  <rect x="178" y="50" width="148" height="74" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="252" y="74" text-anchor="middle" font-size="11" font-weight="600" fill="#1D4ED8">1. Initialize</text>
  <text x="252" y="91" text-anchor="middle" font-size="10" fill="#2563EB">Copy SKILL.md</text>
  <text x="252" y="106" text-anchor="middle" font-size="10" fill="#2563EB">→ skill-v0.md</text>

  <!-- Arrow → -->
  <line x1="326" y1="87" x2="342" y2="87" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── STEP 3: Baseline Benchmark ── -->
  <rect x="344" y="50" width="148" height="74" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="418" y="74" text-anchor="middle" font-size="11" font-weight="600" fill="#1D4ED8">2. Baseline Run</text>
  <text x="418" y="91" text-anchor="middle" font-size="10" fill="#2563EB">Benchmark all</text>
  <text x="418" y="106" text-anchor="middle" font-size="10" fill="#2563EB">models × tasks</text>

  <!-- Arrow → into loop -->
  <line x1="492" y1="87" x2="508" y2="87" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── ITERATION LOOP GROUP ── -->
  <rect x="510" y="38" width="454" height="196" rx="10" fill="#FFF7ED" stroke="#FBB08A" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="737" y="56" text-anchor="middle" font-size="10" font-style="italic" fill="#C2410C">Iteration Loop (repeats until stable or maxIterations reached)</text>

  <!-- Step 3: Analyze -->
  <rect x="522" y="64" width="122" height="80" rx="7" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="583" y="88" text-anchor="middle" font-size="11" font-weight="600" fill="#1D4ED8">3. Analyze</text>
  <text x="583" y="104" text-anchor="middle" font-size="10" fill="#2563EB">Bucket failures</text>
  <text x="583" y="119" text-anchor="middle" font-size="10" fill="#2563EB">by type</text>
  <text x="583" y="134" text-anchor="middle" font-size="9" fill="#93C5FD">(missing · wrong args)</text>

  <!-- Arrow → -->
  <line x1="644" y1="104" x2="660" y2="104" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 4: Mutate -->
  <rect x="662" y="64" width="122" height="80" rx="7" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="723" y="88" text-anchor="middle" font-size="11" font-weight="600" fill="#1D4ED8">4. Mutate</text>
  <text x="723" y="104" text-anchor="middle" font-size="10" fill="#2563EB">LLM agent edits</text>
  <text x="723" y="119" text-anchor="middle" font-size="10" fill="#2563EB">skill-vN.md</text>
  <text x="723" y="134" text-anchor="middle" font-size="9" fill="#93C5FD">(surgical patches)</text>

  <!-- Arrow → -->
  <line x1="784" y1="104" x2="800" y2="104" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 5: Re-Benchmark -->
  <rect x="802" y="64" width="148" height="80" rx="7" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="876" y="88" text-anchor="middle" font-size="11" font-weight="600" fill="#1D4ED8">5. Re-Benchmark</text>
  <text x="876" y="104" text-anchor="middle" font-size="10" fill="#2563EB">All models × tasks</text>
  <text x="876" y="119" text-anchor="middle" font-size="10" fill="#2563EB">with mutated skill</text>
  <text x="876" y="134" text-anchor="middle" font-size="9" fill="#93C5FD">(static eval, no exec)</text>

  <!-- Down arrow from Re-Benchmark -->
  <line x1="876" y1="144" x2="876" y2="164" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Accept? box (below, spanning analyze→re-benchmark) -->
  <rect x="522" y="166" width="428" height="54" rx="7" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="736" y="189" text-anchor="middle" font-size="11" font-weight="600" fill="#92400E">6. Accept?   weighted avg improved ≥ minImprovement  AND  no model drops below floor</text>
  <text x="736" y="207" text-anchor="middle" font-size="10" fill="#B45309">✓ Accept → save skill-v{N+1}.md, continue      ✗ Reject → restore checkpoint, continue</text>

  <!-- Loop-back arrow from left side of accept box back to top of Analyze -->
  <path d="M 522 193 Q 490 193 490 104 Q 490 64 522 64" stroke="#9CA3AF" stroke-width="1.3" fill="none" stroke-dasharray="4,3" marker-end="url(#arr-loop)"/>

  <!-- Arrow out of loop (right side) to Output -->
  <line x1="964" y1="87" x2="980" y2="87" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── OUTPUT ── -->
  <rect x="982" y="50" width="98" height="74" rx="8" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.5"/>
  <text x="1031" y="74" text-anchor="middle" font-size="11" font-weight="600" fill="#15803D">Output</text>
  <text x="1031" y="91" text-anchor="middle" font-size="10" fill="#16A34A">skill-vN.md</text>
  <text x="1031" y="106" text-anchor="middle" font-size="10" fill="#16A34A">ready to review</text>

  <!-- ── BOTTOM NOTE ── -->
  <rect x="20" y="252" width="1060" height="46" rx="7" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1.5"/>
  <text x="550" y="272" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Progress Table  —  Baseline → v1 → v2 → … → vN · per-model Δ shown · your original SKILL.md is never modified</text>
  <text x="550" y="289" text-anchor="middle" font-size="10" fill="#6B7280">Exit codes: 0 = PASS (gates met), 1 = FAIL  ·  Use in CI with: skill-optimizer run --config ./skill-optimizer.json</text>
</svg>
