name: firecrawl-cli
kind: capability
targetPassRate: 0.4
source:
  type: git
  url: https://github.com/firecrawl/cli
  ref: 3c6ac28a0c7b3d877df811db7942e918c32235ca
  includedPaths:
    - skills/
references: ./references
env:
  - OPENROUTER_API_KEY
artifacts:
  - .firecrawl/**
  - firecrawl-calls.ndjson
timeoutSeconds: 600
models:
  - openrouter/openai/gpt-4.1-mini
cases:
  - name: search-with-scrape
    task: |
      Can you find a few good pages about browser automation and save the full results somewhere local?
      I want enough content to compare sources, not just snippets.
    graders:
      - name: uses-search
        command: node $CASE/checks/firecrawl.mjs search-with-scrape uses-search
      - name: search-scrapes-results
        command: node $CASE/checks/firecrawl.mjs search-with-scrape search-scrapes-results
      - name: search-json-output
        command: node $CASE/checks/firecrawl.mjs search-with-scrape search-json-output
      - name: saves-search-output
        command: node $CASE/checks/firecrawl.mjs search-with-scrape saves-search-output
      - name: avoids-redundant-scrape
        command: node $CASE/checks/firecrawl.mjs search-with-scrape avoids-redundant-scrape
  - name: scrape-known-url
    task: |
      Can you grab this page as markdown for me: https://example.com/docs?tab=api&lang=ts
      Save it locally so I can inspect it later.
    graders:
      - name: uses-scrape
        command: node $CASE/checks/firecrawl.mjs scrape-known-url uses-scrape
      - name: scrapes-requested-url
        command: node $CASE/checks/firecrawl.mjs scrape-known-url scrapes-requested-url
      - name: saves-markdown-output
        command: node $CASE/checks/firecrawl.mjs scrape-known-url saves-markdown-output
      - name: avoids-known-url-search
        command: node $CASE/checks/firecrawl.mjs scrape-known-url avoids-known-url-search
  - name: map-site-for-auth
    task: |
      I know the auth docs are somewhere on https://docs.example.com, but I don't know the exact URL.
      Can you find the most relevant auth page and save what you find?
    graders:
      - name: uses-map
        command: node $CASE/checks/firecrawl.mjs map-site-for-auth uses-map
      - name: maps-docs-site
        command: node $CASE/checks/firecrawl.mjs map-site-for-auth maps-docs-site
      - name: filters-for-auth
        command: node $CASE/checks/firecrawl.mjs map-site-for-auth filters-for-auth
      - name: saves-map-output
        command: node $CASE/checks/firecrawl.mjs map-site-for-auth saves-map-output
  - name: crawl-docs-section
    task: |
      I need a small local dump of the docs section from https://docs.example.com.
      Keep it scoped to /docs and don't go crazy on page count.
    graders:
      - name: uses-crawl
        command: node $CASE/checks/firecrawl.mjs crawl-docs-section uses-crawl
      - name: crawls-docs-host
        command: node $CASE/checks/firecrawl.mjs crawl-docs-section crawls-docs-host
      - name: scopes-to-docs
        command: node $CASE/checks/firecrawl.mjs crawl-docs-section scopes-to-docs
      - name: waits-for-results
        command: node $CASE/checks/firecrawl.mjs crawl-docs-section waits-for-results
      - name: bounds-page-limit
        command: node $CASE/checks/firecrawl.mjs crawl-docs-section bounds-page-limit
      - name: saves-crawl-output
        command: node $CASE/checks/firecrawl.mjs crawl-docs-section saves-crawl-output
  - name: parse-local-pdf
    task: |
      Can you turn /work/docs/report.pdf into markdown and save it locally?
      Don't treat it like a webpage.
    graders:
      - name: uses-parse
        command: node $CASE/checks/firecrawl.mjs parse-local-pdf uses-parse
      - name: parses-local-path
        command: node $CASE/checks/firecrawl.mjs parse-local-pdf parses-local-path
      - name: saves-parse-output
        command: node $CASE/checks/firecrawl.mjs parse-local-pdf saves-parse-output
      - name: avoids-local-file-scrape
        command: node $CASE/checks/firecrawl.mjs parse-local-pdf avoids-local-file-scrape
